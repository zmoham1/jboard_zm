name: Job Radar — Board Sweep

on:
  schedule:
    - cron: "12 */2 * * *"   # Every 2 hours, offset from main and top-of-hour traffic
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Boards per batch (default: 50)"
        required: false
        default: "50"
      run_until_wrap:
        description: "Full sweep (run until cursor wraps)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: job-radar-boards-state
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run board sweep
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DB_PATH: state/gha-boards.db
          BOARDS_RESCAN_COOLDOWN_HOURS: ${{ github.event_name == 'schedule' && '0' || '' }}
        run: |
          BATCH=${{ github.event.inputs.batch_size || '50' }}
          WRAP=${{ github.event.inputs.run_until_wrap || 'false' }}
          CMD="python -m src.main --mode boards --boards-batch-size $BATCH --notify-yes-only --no-notify"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$WRAP" = "true" ]; then
            CMD="$CMD --boards-run-until-wrap"
          fi
          eval $CMD

      - name: Export dead boards report
        env:
          DB_PATH: state/gha-boards.db
        run: python -m src.main --mode boards --dry-run --export-dead-csv state/gha-dead_boards.csv
        continue-on-error: true

      - name: Compact boards database
        run: |
          if [ -f state/gha-boards.db ]; then
            python -c "import sqlite3; from pathlib import Path; db_path = Path('state/gha-boards.db'); conn = sqlite3.connect(db_path); conn.execute('PRAGMA wal_checkpoint(TRUNCATE)'); conn.execute('VACUUM'); conn.close(); print(f'Compacted {db_path}: {db_path.stat().st_size} bytes')"
          fi

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MAX_BYTES=$((95 * 1024 * 1024))
          if [ -f state/gha-boards.db ]; then
            DB_BYTES=$(wc -c < state/gha-boards.db)
            echo "state/gha-boards.db size: ${DB_BYTES} bytes"
            if [ "$DB_BYTES" -le "$MAX_BYTES" ]; then
              git add -f state/gha-boards.db
            else
              echo "::warning file=state/gha-boards.db::Skipping boards DB commit because ${DB_BYTES} bytes exceeds the 95 MiB safety threshold for GitHub's 100 MB file limit."
              git restore --worktree state/gha-boards.db
            fi
          fi
          if [ -f state/gha-dead_boards.csv ]; then git add state/gha-dead_boards.csv; fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update boards state [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }}
            if git push origin HEAD:${{ github.ref_name }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push race detected on attempt $attempt; retrying after a short pause."
              sleep 3
            fi
          done
          echo "State push failed after 3 attempts."
          exit 1
