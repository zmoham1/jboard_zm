name: Job Radar — Main Sources

on:
  schedule:
    - cron: "0 12 * * *"     # Every morning at 8:00 AM ET / 12:00 UTC
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

concurrency:
  group: job-radar-state
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Radar (main mode)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DB_PATH: state/gha-jobs.db
        run: python -m src.main --mode main

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/gha-jobs.db
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }}
            if git push origin HEAD:${{ github.ref_name }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push race detected on attempt $attempt; retrying after a short pause."
              sleep 3
            fi
          done
          echo "State push failed after 3 attempts."
          exit 1
